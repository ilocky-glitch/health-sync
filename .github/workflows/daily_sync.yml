name: Daily Health Sync

on:
  schedule:
    # 8:30 AM Singapore Time = 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      sync_date:
        description: 'Date to sync (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip cache purge
          pip install -r scripts/requirements.txt

      - name: Determine sync date
        run: |
          if [ -n "${{ github.event.inputs.sync_date }}" ]; then
            echo "SYNC_DATE=${{ github.event.inputs.sync_date }}" >> $GITHUB_ENV
          else
            echo "SYNC_DATE=$(date -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_ENV
          fi
          echo "Syncing date: $SYNC_DATE"

      # Each sync runs independently (continue-on-error) so one failing source
      # never blocks the others. The final "Summary & gate" step still fails the
      # job if any source failed, so a broken source surfaces as a red run.

      - name: Run Garmin sync
        id: garmin
        continue-on-error: true
        env:
          GARMIN_OAUTH_TOKEN: ${{ secrets.GARMIN_OAUTH_TOKEN }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_GARMIN:   ${{ secrets.NOTION_DB_GARMIN }}
          NOTION_DB_RUNNING:  ${{ secrets.NOTION_DB_RUNNING }}
          SYNC_DATE:          ${{ env.SYNC_DATE }}
        run: python scripts/garmin_sync.py

      - name: Run Dexcom sync
        id: dexcom
        continue-on-error: true
        env:
          DEXCOM_USERNAME: ${{ secrets.DEXCOM_USERNAME }}
          DEXCOM_PASSWORD: ${{ secrets.DEXCOM_PASSWORD }}
          DEXCOM_REGION:   jp
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_CGM:   ${{ secrets.NOTION_DB_CGM }}
          SYNC_DATE:       ${{ env.SYNC_DATE }}
        run: python scripts/dexcom_sync.py

      - name: Run Strength sync
        id: strength
        continue-on-error: true
        env:
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_STRENGTH:  ${{ secrets.NOTION_DB_STRENGTH }}
          NOTION_DB_CGM:       ${{ secrets.NOTION_DB_CGM }}
          NOTION_DB_GARMIN:    ${{ secrets.NOTION_DB_GARMIN }}
          NOTION_DB_1RM:       ${{ secrets.NOTION_DB_1RM }}
          SYNC_DATE:           ${{ env.SYNC_DATE }}
        run: python scripts/strength_sync.py

      - name: Summary & gate
        if: always()
        run: |
          G="${{ steps.garmin.outcome }}"
          D="${{ steps.dexcom.outcome }}"
          S="${{ steps.strength.outcome }}"
          {
            echo "## Health Sync — $SYNC_DATE"
            echo ""
            echo "| Source   | Result |"
            echo "|----------|--------|"
            echo "| Garmin   | $G |"
            echo "| Dexcom   | $D |"
            echo "| Strength | $S |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          for o in "$G" "$D" "$S"; do
            if [ "$o" != "success" ]; then fail=1; fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more syncs failed for $SYNC_DATE (Garmin=$G Dexcom=$D Strength=$S)"
            exit 1
          fi
          echo "All syncs succeeded for $SYNC_DATE"
